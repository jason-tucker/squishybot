services:
  squishybot:
    # CI sets BOT_IMAGE to ghcr.io/<owner>/squishybot:<sha>.
    # Locally, omit BOT_IMAGE and use `docker compose up -d --build` to build from source.
    image: ${BOT_IMAGE:-squishybot:latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides DATABASE_URL from .env so the bot always connects to the
      # compose-managed postgres service, regardless of what's in .env.
      DATABASE_URL: "postgresql://squishybot:${POSTGRES_PASSWORD:-squishybot_dev}@db:5432/squishybot"
      # Redis is the event bus and (V2+) command bus to botpanel.
      # Lives in the botpanel compose stack on the shared network.
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      default: {}
      botpanel-net: {}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: squishybot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-squishybot_dev}
      POSTGRES_DB: squishybot
    # No host port mapping (security). The bot reaches the DB at "db:5432"
    # over the default compose network; botpanel reaches it at "db-squishy:5432"
    # over the shared botpanel-net network (alias below). If you need psql
    # from the VPS host, use `docker exec -it squishybot-db-1 psql -U squishybot`.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default: {}
      botpanel-net:
        aliases:
          - db-squishy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squishybot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  # Shared external network so botpanel can reach this DB without exposing
  # any host port. Create once on the host:  `docker network create botpanel-net`
  botpanel-net:
    external: true

volumes:
  postgres_data:
