name: Deploy SquishyBot

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Never cancel an in-progress deploy — wait for it to finish first
concurrency:
  group: deploy-squishybot
  cancel-in-progress: false

# Least-privilege default for the whole workflow (including PR-triggered runs).
# Jobs opt into more as needed — the deploy job adds `packages: write` for GHCR.
# Anything not granted here is unavailable to GITHUB_TOKEN regardless of the
# repository's default-token-permissions setting.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Docker Buildx (enables layer caching) ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── 3. Log in to GHCR (uses automatic GITHUB_TOKEN — no extra secret) ─────
      # Only on push to main — PRs validate the build but never push, so no login.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Compute image tags ─────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 5. Build Docker image (push only on main) ─────────────────────────────
      # TypeScript compiles inside Docker (on this runner with 7 GB RAM).
      # The VPS never runs tsc — it just pulls the pre-built image.
      # On a PR this still builds the image (validating the TS compile) but
      # `push` is false, so nothing is published to GHCR.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy slash commands (from built image on runner) ─────────────────
      # Non-blocking — slash command schemas rarely change. If Discord secrets
      # aren't set, this step will fail (Zod env validation) but the VPS deploy
      # below still runs because of continue-on-error.
      # Push-to-main only: relies on the `:latest` image that was just pushed.
      - name: Deploy slash commands
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          docker run --rm --entrypoint="" \
            -e DISCORD_BOT_TOKEN="${{ secrets.DISCORD_BOT_TOKEN }}" \
            -e DISCORD_CLIENT_ID="${{ secrets.DISCORD_CLIENT_ID }}" \
            -e GUILD_ID="${{ secrets.GUILD_ID }}" \
            -e DATABASE_URL="postgresql://placeholder/placeholder" \
            -e AUTO_VOICE_CATEGORY_ID="placeholder" \
            -e HUB_CHANNEL_IDS="placeholder" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            node dist/bot/registerCommands.js

      # ── 7. Deploy to VPS ──────────────────────────────────────────────────────
      # Push-to-main only — never deploy from a PR.
      - name: Deploy to VPS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd ${{ secrets.PROJECT_DIR }}

            # Pull latest source (for docker-compose.yml and .env updates)
            git fetch --all
            git reset --hard origin/main

            export BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            # ── Pre-deploy DB backup gate ────────────────────────────────────
            # The new image runs schema migrations on startup. Dump the DB FIRST
            # so a bad migration is always recoverable. Abort the deploy if the
            # backup can't be taken — better to skip a deploy than to migrate
            # with no rollback. The `db` service stays up across this deploy.
            BACKUP_DIR="./backups"
            mkdir -p "$BACKUP_DIR"
            TS=$(date -u +%Y%m%dT%H%M%SZ)
            BACKUP_FILE="$BACKUP_DIR/squishybot-$TS.sql.gz"
            echo "▶ Backing up database to $BACKUP_FILE …"
            if docker compose exec -T db sh -c \
                 'PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB"' \
                 | gzip > "$BACKUP_FILE"; then
              echo "✓ DB backup written ($(du -h "$BACKUP_FILE" | cut -f1))"
            else
              echo "ERROR: DB backup failed — aborting deploy (no unrecoverable migration)"
              rm -f "$BACKUP_FILE"
              exit 1
            fi
            # Retain only the 14 most recent backups
            ls -1t "$BACKUP_DIR"/squishybot-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f

            # Pull the new image.
            docker compose pull squishybot

            # Bring the container up on the new image. The squishybot service is
            # also labelled for watchtower (com.centurylinklabs.watchtower.enable),
            # so watchtower independently watches :latest and may already be
            # recreating the container when this step runs. A single `compose up`
            # then races it and dies with "removal of container ... is already in
            # progress". Retry a few times: once watchtower's recreate settles,
            # `up -d` converges to a no-op (container already on the new :latest)
            # and succeeds. Both deployers stay enabled; they just stop fighting.
            for attempt in 1 2 3 4 5; do
              if docker compose up -d --remove-orphans; then
                echo "✓ compose up succeeded (attempt $attempt)"
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "ERROR: compose up failed after $attempt attempts"
                docker compose logs squishybot --tail=30 || true
                exit 1
              fi
              echo "compose up attempt $attempt failed (likely a watchtower recreate race) — retrying in 8s…"
              sleep 8
            done

            # Wait for container to be healthy
            sleep 10
            if ! docker compose ps squishybot | grep -q "running\|Up"; then
              echo "ERROR: squishybot container is not running"
              docker compose logs squishybot --tail=30
              exit 1
            fi

            echo "✓ squishybot is running."
            docker compose ps squishybot

      # ── 8. Notify Discord — success ───────────────────────────────────────────
      # Skipped silently if the webhook isn't configured.
      # Push-to-main only — PRs don't deploy, so there's nothing to announce.
      - name: Notify success
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_DEPLOY_WEBHOOK not set — skipping notification"; exit 0; fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ SquishyBot deployed\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 5763719,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR}\" }
              }]
            }"

      # ── 9. Notify Discord — failure ───────────────────────────────────────────
      # Push-to-main only — a failed PR build reports via the check itself.
      - name: Notify failure
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_DEPLOY_WEBHOOK not set — skipping notification"; exit 0; fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ SquishyBot deploy FAILED\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 15548997,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR} — check Actions logs\" }
              }]
            }"
