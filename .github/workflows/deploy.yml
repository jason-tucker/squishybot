name: Deploy SquishyBot

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel an in-progress deploy — wait for it to finish first
concurrency:
  group: deploy-squishybot
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Docker Buildx (enables layer caching) ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── 3. Log in to GHCR (uses automatic GITHUB_TOKEN — no extra secret) ─────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Compute image tags ─────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 5. Build Docker image and push to GHCR ────────────────────────────────
      # TypeScript compiles inside Docker (on this runner with 7 GB RAM).
      # The VPS never runs tsc — it just pulls the pre-built image.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy slash commands (from built image on runner) ─────────────────
      # Non-blocking — slash command schemas rarely change. If Discord secrets
      # aren't set, this step will fail (Zod env validation) but the VPS deploy
      # below still runs because of continue-on-error.
      - name: Deploy slash commands
        continue-on-error: true
        run: |
          docker run --rm --entrypoint="" \
            -e DISCORD_BOT_TOKEN="${{ secrets.DISCORD_BOT_TOKEN }}" \
            -e DISCORD_CLIENT_ID="${{ secrets.DISCORD_CLIENT_ID }}" \
            -e GUILD_ID="${{ secrets.GUILD_ID }}" \
            -e DATABASE_URL="postgresql://placeholder/placeholder" \
            -e AUTO_VOICE_CATEGORY_ID="placeholder" \
            -e HUB_CHANNEL_IDS="placeholder" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            node dist/bot/registerCommands.js

      # ── 7. Deploy to VPS ──────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd ${{ secrets.PROJECT_DIR }}

            # Pull latest source (for docker-compose.yml and .env updates)
            git fetch --all
            git reset --hard origin/main

            # Pull the new image and restart
            BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              docker compose pull squishybot

            BOT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
              docker compose up -d --remove-orphans

            # Wait for container to be healthy
            sleep 10
            if ! docker compose ps squishybot | grep -q "running\|Up"; then
              echo "ERROR: squishybot container is not running"
              docker compose logs squishybot --tail=30
              exit 1
            fi

            echo "✓ squishybot is running."
            docker compose ps squishybot

      # ── 8. Notify Discord — success ───────────────────────────────────────────
      # Skipped silently if the webhook isn't configured.
      - name: Notify success
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_DEPLOY_WEBHOOK not set — skipping notification"; exit 0; fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ SquishyBot deployed\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 5763719,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR}\" }
              }]
            }"

      # ── 9. Notify Discord — failure ───────────────────────────────────────────
      - name: Notify failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_DEPLOY_WEBHOOK not set — skipping notification"; exit 0; fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          curl -s -o /dev/null -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ SquishyBot deploy FAILED\",
                \"description\": \"[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) ${COMMIT_MSG}\",
                \"color\": 15548997,
                \"footer\": { \"text\": \"Triggered by ${GITHUB_ACTOR} — check Actions logs\" }
              }]
            }"
